<!DOCTYPE html>
<html lang="en" dir="ltr" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduled Maintenance — Stackly</title>
  <meta name="description" content="We're currently performing scheduled maintenance. We'll be back shortly." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563EB'/%3E%3Cpath d='M9 20V12l7-4 7 4v8l-7 4-7-4Z' stroke='white' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
  <script>(function(){try{var t=localStorage.getItem("stackly-theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.classList.toggle("dark",t==="dark");}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <script>tailwind.config = window.stacklyTailwindConfig;</script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    :root { --color-primary: 37 99 235; --color-accent: 6 182 212; }
    html.dark { --color-primary: 96 165 250; --color-accent: 34 211 238; }
  </style>
</head>
<body class="font-body bg-body text-ink antialiased">
  <main class="min-h-screen relative overflow-hidden flex items-center justify-center px-6 py-16">
    <div class="absolute inset-0 bg-mesh opacity-50 dark:opacity-30" aria-hidden="true"></div>

    <div class="relative max-w-lg w-full text-center">
      <a href="index.html" class="inline-flex items-center gap-2 font-heading font-extrabold text-xl mb-10">
        <span class="w-9 h-9 rounded-md bg-gradient-brand flex items-center justify-center text-white"><i data-lucide="box" class="w-5 h-5"></i></span>
        Stackly
      </a>
      <span data-reveal="zoom-in" class="relative inline-flex w-24 h-24 rounded-full bg-primary/10 text-primary items-center justify-center mb-6 animate-pulse-ring">
        <i data-lucide="wrench" class="w-10 h-10"></i>
      </span>
      <h1 data-reveal="fade-up" class="font-heading font-bold text-2xl sm:text-3xl">We'll be right back</h1>
      <p data-reveal="fade-up" data-reveal-delay="80" class="text-muted mt-3">Stackly is undergoing scheduled maintenance to bring you a faster, better experience. Thanks for your patience.</p>

      <div data-reveal="fade-up" data-reveal-delay="160" class="mt-8 p-5 rounded-lg border border-border bg-surface text-sm flex items-center justify-center gap-2">
        <i data-lucide="clock" class="w-4 h-4 text-primary"></i> Expected back online: <span class="font-semibold">Today, 6:00 PM UTC</span>
      </div>

      <div data-reveal="fade-up" data-reveal-delay="220" class="mt-8 flex flex-wrap justify-center gap-3">
        <a href="mailto:hello@stackly.com" class="inline-flex items-center gap-2 px-6 py-3 rounded-md bg-gradient-brand text-white font-semibold shadow-glow">
          <i data-lucide="mail" class="w-4 h-4"></i> Email Support
        </a>
        <a href="#" class="inline-flex items-center gap-2 px-6 py-3 rounded-md border border-border hover:bg-surface-2 font-semibold transition-colors">
          <i data-lucide="twitter" class="w-4 h-4"></i> Status Updates
        </a>
      </div>
    </div>
  </main>
  <script src="../assets/js/modules/theme.js" defer></script>
  <script src="../assets/js/modules/nav.js" defer></script>
  <script src="../assets/js/modules/reveal.js" defer></script>
  <script src="../assets/js/modules/counter.js" defer></script>
  <script src="../assets/js/modules/forms.js" defer></script>
  <script src="../assets/js/modules/components.js" defer></script>
  <script src="../assets/js/modules/micro.js" defer></script>
  <script src="../assets/js/modules/favorites.js" defer></script>
  <script src="../assets/js/modules/ripple.js" defer></script>
  <script src="../assets/js/modules/carousel.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</body>
</html>
