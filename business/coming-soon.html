<!DOCTYPE html>
<html lang="en" dir="ltr" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — Verve Studio</title>
  <meta name="description" content="Something new is on the way. Sign up to be notified when we launch." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563EB'/%3E%3Cpath d='M9 20V12l7-4 7 4v8l-7 4-7-4Z' stroke='white' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
  <script>(function(){try{var t=localStorage.getItem("stackly-theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.classList.toggle("dark",t==="dark");}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <script>tailwind.config = window.stacklyTailwindConfig;</script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    :root { --color-primary: 37 99 235; --color-accent: 6 182 212; }
    html.dark { --color-primary: 96 165 250; --color-accent: 34 211 238; }
  </style>
</head>
<body class="font-body bg-body text-ink antialiased">
  <main class="min-h-screen relative overflow-hidden flex items-center justify-center px-6 py-16">
    <div class="absolute inset-0 bg-mesh opacity-60 dark:opacity-35" aria-hidden="true"></div>
    <div class="absolute -top-10 -end-10 w-72 h-72 rounded-full bg-accent/20 blur-3xl animate-float" aria-hidden="true"></div>
    <div class="absolute bottom-0 -start-16 w-80 h-80 rounded-full bg-primary/20 blur-3xl animate-float-slow" aria-hidden="true"></div>

    <div class="relative max-w-xl w-full text-center">
      <a href="index.html" class="inline-flex items-center gap-2 font-heading font-extrabold text-xl mb-10">
        <span class="w-9 h-9 rounded-md bg-gradient-brand flex items-center justify-center text-white"><i data-lucide="box" class="w-5 h-5"></i></span>
        Verve Studio
      </a>
      <span data-reveal="fade-up" class="inline-flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-full glass text-primary mb-6">
        <i data-lucide="rocket" class="w-3.5 h-3.5"></i> Launching soon
      </span>
      <h1 data-reveal="fade-up" data-reveal-delay="80" class="font-heading font-extrabold text-3xl sm:text-5xl">Something great is <span class="text-gradient">on the way</span></h1>
      <p data-reveal="fade-up" data-reveal-delay="160" class="text-muted mt-5">We're putting the finishing touches on this page. Leave your email and we'll let you know the moment it's live.</p>

      <div data-reveal="fade-up" data-reveal-delay="220" class="grid grid-cols-4 gap-3 sm:gap-4 mt-10 max-w-md mx-auto" id="countdown" data-countdown="2026-09-01T00:00:00">
        <div class="p-4 rounded-lg border border-border bg-surface"><p class="font-heading font-extrabold text-2xl sm:text-3xl" data-cd="days">00</p><p class="text-xs text-muted mt-1">Days</p></div>
        <div class="p-4 rounded-lg border border-border bg-surface"><p class="font-heading font-extrabold text-2xl sm:text-3xl" data-cd="hours">00</p><p class="text-xs text-muted mt-1">Hours</p></div>
        <div class="p-4 rounded-lg border border-border bg-surface"><p class="font-heading font-extrabold text-2xl sm:text-3xl" data-cd="minutes">00</p><p class="text-xs text-muted mt-1">Minutes</p></div>
        <div class="p-4 rounded-lg border border-border bg-surface"><p class="font-heading font-extrabold text-2xl sm:text-3xl" data-cd="seconds">00</p><p class="text-xs text-muted mt-1">Seconds</p></div>
      </div>

      <form data-validate data-reveal="fade-up" data-reveal-delay="280" class="mt-10 flex flex-col sm:flex-row gap-3 max-w-md mx-auto" novalidate>
        <div data-field-wrapper class="flex-1 text-start">
          <label for="cs-email" class="sr-only">Email address</label>
          <input id="cs-email" name="email" type="email" required data-field="email" placeholder="you@company.com" class="w-full px-4 py-3 rounded-md border border-border bg-surface focus:border-primary outline-none text-sm" />
          <p data-field-message class="hidden text-xs text-danger mt-1.5"></p>
        </div>
        <button type="submit" class="px-6 py-3 rounded-md bg-gradient-brand text-white font-semibold shadow-glow shrink-0">Notify Me</button>
      </form>
      <p data-form-status class="hidden mt-3" role="status"></p>

      <div class="flex justify-center gap-3 mt-10">
        <a href="#" aria-label="Twitter" class="w-10 h-10 rounded-full bg-surface-2 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i data-lucide="twitter" class="w-4 h-4"></i></a>
        <a href="#" aria-label="LinkedIn" class="w-10 h-10 rounded-full bg-surface-2 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i data-lucide="linkedin" class="w-4 h-4"></i></a>
        <a href="#" aria-label="Instagram" class="w-10 h-10 rounded-full bg-surface-2 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i data-lucide="instagram" class="w-4 h-4"></i></a>
      </div>
    </div>
  </main>
  <script src="../assets/js/modules/theme.js" defer></script>
  <script src="../assets/js/modules/nav.js" defer></script>
  <script src="../assets/js/modules/reveal.js" defer></script>
  <script src="../assets/js/modules/counter.js" defer></script>
  <script src="../assets/js/modules/forms.js" defer></script>
  <script src="../assets/js/modules/components.js" defer></script>
  <script src="../assets/js/modules/micro.js" defer></script>
  <script src="../assets/js/modules/favorites.js" defer></script>
  <script src="../assets/js/modules/ripple.js" defer></script>
  <script src="../assets/js/modules/carousel.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
  <script>
    const cd = document.getElementById("countdown");
    if (cd) {
      const target = new Date(cd.dataset.countdown).getTime();
      const tick = () => {
        const diff = Math.max(target - Date.now(), 0);
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        cd.querySelector('[data-cd="days"]').textContent = String(days).padStart(2, "0");
        cd.querySelector('[data-cd="hours"]').textContent = String(hours).padStart(2, "0");
        cd.querySelector('[data-cd="minutes"]').textContent = String(minutes).padStart(2, "0");
        cd.querySelector('[data-cd="seconds"]').textContent = String(seconds).padStart(2, "0");
      };
      tick();
      setInterval(tick, 1000);
    }
  </script>
</body>
</html>
