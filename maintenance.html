<!DOCTYPE html>
<html lang="en" dir="ltr" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduled Maintenance — Forno &amp; Co.</title>
  <meta name="description" content="Online ordering is temporarily down for scheduled maintenance. We'll be back shortly." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23EA580C'/%3E%3Ccircle cx='16' cy='16' r='10' fill='%23FEF3C7'/%3E%3Ccircle cx='13' cy='13' r='1.6' fill='%23DC2626'/%3E%3Ccircle cx='19' cy='14' r='1.6' fill='%23DC2626'/%3E%3Ccircle cx='16' cy='19' r='1.6' fill='%23DC2626'/%3E%3C/svg%3E" />
  <script>(function(){try{var t=localStorage.getItem("stackly-theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.classList.toggle("dark",t==="dark");}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <script>tailwind.config = window.stacklyTailwindConfig;</script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js" defer></script>
  <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js" defer></script>
  <script src="https://unpkg.com/lenis@1/dist/lenis.min.js" defer></script>
</head>
<body class="font-body bg-body text-ink antialiased">
  <div id="preloader" class="fixed inset-0 z-[300] flex items-center justify-center bg-body" aria-hidden="true">
    <div class="flex flex-col items-center gap-4">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 rounded-full border-4 border-border"></div>
        <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-primary preloader-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4"><img src="assets/img/logo.svg" alt="" class="w-full h-full" /></div>
      </div>
      <span class="font-heading font-bold text-xs tracking-widest uppercase text-muted">Loading</span>
    </div>
  </div>
  <main class="min-h-screen relative overflow-hidden flex items-center justify-center px-6 py-16">
    <div class="absolute inset-0 bg-mesh opacity-50 dark:opacity-30" aria-hidden="true"></div>
    <div class="absolute -top-10 -end-10 w-72 h-72 rounded-full bg-accent/20 blur-3xl animate-float" aria-hidden="true"></div>
    <div class="absolute bottom-0 -start-16 w-72 h-72 rounded-full bg-primary/15 blur-3xl" data-parallax="0.1" aria-hidden="true"></div>

    <div class="relative max-w-lg w-full text-center">
      <a href="index.html" class="inline-flex items-center gap-2 font-heading font-extrabold text-xl mb-10">
        <span class="w-9 h-9 rounded-full bg-gradient-brand flex items-center justify-center text-white p-[7px]"><img src="assets/img/logo.svg" alt="" class="w-full h-full" /></span>
        Forno &amp; Co.
      </a>
      <span data-reveal="zoom-in" class="relative inline-flex w-24 h-24 rounded-full bg-primary/10 text-primary items-center justify-center mb-6 animate-pulse-ring">
        <i data-lucide="chef-hat" class="w-10 h-10"></i>
      </span>
      <h1 data-reveal="fade-up" class="font-heading font-bold text-2xl sm:text-3xl">Back in the kitchen shortly</h1>
      <p data-reveal="fade-up" data-reveal-delay="80" class="text-muted mt-3">Online ordering is offline for a quick tune-up. Feel free to call in your order in the meantime — we're still cooking.</p>

      <div data-reveal="fade-up" data-reveal-delay="160" class="mt-8 p-5 rounded-lg border border-border bg-surface text-sm flex items-center justify-center gap-2">
        <i data-lucide="clock" class="w-4 h-4 text-primary"></i> Back online: <span class="font-semibold">Today, 6:00 PM</span>
      </div>

      <div data-reveal="fade-up" data-reveal-delay="220" class="mt-8 flex flex-wrap justify-center gap-3">
        <a data-ripple href="tel:+15550107499" class="inline-flex items-center gap-2 px-6 py-3 rounded-md bg-gradient-brand text-white font-semibold shadow-glow">
          <i data-lucide="phone" class="w-4 h-4"></i> Call to Order: (555) 010-7499
        </a>
        <a href="#" class="inline-flex items-center gap-2 px-6 py-3 rounded-md border border-border hover:bg-surface-2 font-semibold transition-colors">
          <i data-lucide="instagram" class="w-4 h-4"></i> Status Updates
        </a>
      </div>
    </div>
  </main>
  <script src="assets/js/modules/theme.js" defer></script>
  <script src="assets/js/modules/nav.js" defer></script>
  <script src="assets/js/modules/reveal.js" defer></script>
  <script src="assets/js/modules/counter.js" defer></script>
  <script src="assets/js/modules/forms.js" defer></script>
  <script src="assets/js/modules/components.js" defer></script>
  <script src="assets/js/modules/micro.js" defer></script>
  <script src="assets/js/modules/motion.js" defer></script>
  <script src="assets/js/modules/favorites.js" defer></script>
  <script src="assets/js/modules/ripple.js" defer></script>
  <script src="assets/js/modules/carousel.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
